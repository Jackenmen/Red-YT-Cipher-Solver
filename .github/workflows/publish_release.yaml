name: Publish Release

on:
  push:
    tags:
      - "*"

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    environment:
      name: Release
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish
